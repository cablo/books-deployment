apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - until pg_isready -h postgres-service -p 5432 -U {{ .Values.postgres.user }}; do echo "Waiting for postgres..."; sleep 2; done
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: DATASOURCE_URL
              value: {{ .Values.backend.datasource.url }}
            - name: DATASOURCE_USERNAME
              value: {{ .Values.backend.datasource.username }}
            - name: DATASOURCE_PASSWORD
              value: {{ .Values.backend.datasource.password }}