metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 8080       # Port, na kterém to uvidíš ve Windows (http://localhost:8080)
      targetPort: 80   # Interní port Nginx kontejneru

